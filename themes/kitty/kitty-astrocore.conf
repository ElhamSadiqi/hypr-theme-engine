# ==========================================
# CYBERCREAM - NEON JELLYFISH EDITION (KITTY)
# ==========================================

# --- Fonts & Style ---
font_family          JetBrainsMono Nerd Font
font_size            12.0
window_padding_width 27

background_opacity          0.5
dynamic_background_opacity  yes

# --- Primary Canvas ---
background            #102021
foreground            #ebdbb2
selection_background  #ebdbb2
selection_foreground  #102021

# --- Cursor ---
cursor                #00f5d4
cursor_text_color     #102021
cursor_shape          beam
cursor_beam_thickness 5.0
cursor_blink_interval 0.5

# Adds a smooth, fading trail behind the moving pipe cursor
cursor_trail 3
cursor_trail_decay 0.1 0.4

# --- Tabs ---
active_tab_background   #ff007f
active_tab_foreground   #102021
inactive_tab_background #102021
inactive_tab_foreground #ebdbb2

# --- Color Palette (Jellyfish x Cybercream) ---

# Black / Dark Grey
color0   #102021
color8   #506061

# Red / Neon Magenta (Jellyfish tentacles)
color1   #ff007f
color9   #ff409f

# Green / Mint-Sage Accent
color2   #a7c080
color10  #bdffd0

# Yellow / Bright Orange-Yellow (Jellyfish highlights)
color3   #ffb703
color11  #ffdd00

# Blue / Electric Teal-Cyan (Jellyfish cap glow)
color4   #00f5d4
color12  #70fff0

# Magenta / Soft Pink-Purple
color5   #d3869b
color13  #f4b8e4

# Cyan / Sky Accent
color6   #89dceb
color14  #94e2d5

# White / Soft Cream Text
color7   #ebdbb2
color15  #ffffff
