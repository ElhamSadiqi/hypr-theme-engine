# ==========================================
# CATPPUCCIN MOCHA - HYPRLAND THEME (KITTY)
# ==========================================

# --- Fonts & Style ---
font_family          JetBrainsMono Nerd Font
font_size            12.0
window_padding_width 27

background_opacity          0.5
dynamic_background_opacity  yes

# --- Primary Canvas ---
background            #1e1e2e
foreground            #cdd6f4
selection_background  #f5e0dc
selection_foreground  #1e1e2e

# --- Cursor ---
cursor                #f5e0dc
cursor_text_color     #1e1e2e
cursor_shape          beam
cursor_beam_thickness 5.0
cursor_blink_interval 0.5

# Adds a smooth, fading trail behind the moving pipe cursor
cursor_trail 3
cursor_trail_decay 0.1 0.4

# --- Tabs ---
active_tab_background   #89b4fa
active_tab_foreground   #11111b
inactive_tab_background #181825
inactive_tab_foreground #cdd6f4

# --- Color Palette ---

# Black / Dark
color0   #45475a
color8   #585b70

# Red
color1   #f38ba8
color9   #f38ba8

# Green
color2   #a6e3a1
color10  #a6e3a1

# Yellow
color3   #f9e2af
color11  #f9e2af

# Blue (Main Theme)
color4   #89b4fa
color12  #89b4fa

# Magenta
color5   #f5c2e7
color13  #f5c2e7

# Cyan
color6   #94e2d5
color14  #94e2d5

# White
color7   #bac2de
color15  #a6adc8
