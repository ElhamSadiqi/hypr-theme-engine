# =========================
# AMBER NIGHT CONTRAST - KITTY
# =========================

# --- Fonts & Style ---
font_family      JetBrainMono Nerd Font
font_size        12.0
window_padding_width 24

background_opacity 0.60
dynamic_background_opacity yes

# --- Core Colors (BIG CHANGE HERE) ---
background            #0F1115   # deep cold graphite (breaks sepia monotony)
foreground            #D6D6D6   # clean neutral text

selection_background  #D68438   # amber highlight (your system accent)
selection_foreground  #0F1115

# --- Base ANSI colors ---
color0   #0F1115   # black
color1   #E06C75   # soft red (errors)
color2   #98C379   # soft green (success)
color3   #E5C07B   # warm yellow (warnings)
color4   #61AFEF   # cool blue (info / structure contrast)
color5   #C678DD   # soft violet (secondary accent)
color6   #56B6C2   # cyan (system data / highlights)
color7   #D6D6D6   # light foreground
color8   #7C828B   # dim gray

# Bright variants
color9   #E06C75
color10  #98C379
color11  #E5C07B
color12  #61AFEF
color13  #C678DD
color14  #56B6C2
color15  #FFFFFF   # pure highlight

# --- Your system identity anchor ---
# Amber is ONLY for "focus moments", not everything
cursor                #D68438
cursor_text_color     #0F1115
cursor_shape          beam
cursor_beam_thickness 4.5
cursor_blink_interval 0.5

# Adds a smooth, fading trail behind the moving pipe cursor
cursor_trail 3
cursor_trail_decay 0.1 0.4

# --- Tabs ---
active_tab_background   #D68438
active_tab_foreground   #0F1115
inactive_tab_background #0F1115
inactive_tab_foreground #7C828B
