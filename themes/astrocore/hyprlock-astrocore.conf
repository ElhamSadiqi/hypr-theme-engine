background {
    monitor =
    path = /home/Arch/Downloads/Wallpaper/earth.png   # Make sure this path is exactly right
    # Deep Dark Base (#102021)
    color = rgba(16, 32, 33, 1.0)
    
    # This blurs the wallpaper slightly so the text is easier to read
    blur_passes = 0.5
    blur_size = 7
}

# TIME (Bottom Left)
label {
    monitor =
    text = $TIME
    # Solid Wallpaper Cream (#ebdbb2)
    color = rgb(ebdbb2)
    font_size = 90
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 100, 100
    halign = left
    valign = bottom
}

# DATE (Just above the time)
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B")"
    # Wallpaper Cream (#ebdbb2) at 70% opacity
    color = rgba(235, 219, 178, 0.7)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 105, 230
    halign = left
    valign = bottom
}

# INPUT FIELD (Bottom Right - Matching your Waybar Pills)
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    # Muted Sage Green outer outline ring (#689d6a)
    outer_color = rgb(689d6a)
    # Deep Dark Base interior (#102021)
    inner_color = rgb(102021)
    # Wallpaper Cream text input (#ebdbb2)
    font_color = rgb(ebdbb2)
    fade_on_empty = false
    rounding = -1 # Makes it a perfect pill
    # Gruvbox-matched system flags
    check_color = rgb(d65d0e) # Gruvbox orange when checking password
    fail_color = rgb(cc241d) # Gruvbox red on wrong password
    placeholder_text = <span foreground="##ebdbb2">    Logged in as $USER</span>
    hide_input = false
    position = -100, 100
    halign = right
    valign = bottom
}
