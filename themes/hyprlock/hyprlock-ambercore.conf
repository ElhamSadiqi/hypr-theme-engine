background {
    monitor =
    path = /home/Arch/Downloads/Wallpaper/amber.png  # Make sure this path is exactly right
    # Deep Dark Base (#181511)
    color = rgba(24, 21, 17, 1.0)
    
    # This blurs the wallpaper slightly so the text is easier to read
    blur_passes = 0.5
    blur_size = 7
}

# TIME (Bottom Left)
label {
    monitor =
    text = $TIME
    # Solid Wallpaper Cream (#C0B4A4)
    color = rgb(c0b4a4)
    font_size = 90
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 100, 100
    halign = left
    valign = bottom
}

# DATE (Just above the time)
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B")"
    # Wallpaper Cream (#C0B4A4) at 70% opacity
    color = rgba(192, 180, 164, 0.7)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 105, 230
    halign = left
    valign = bottom
}

# INPUT FIELD (Bottom Right - Matching your Waybar Pills)
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    # Subdued Dark Bronze outer outline ring (#7A583A)
    outer_color = rgb(7a583a)
    # Deep Dark Base interior (#181511)
    inner_color = rgb(181511)
    # Wallpaper Cream text input (#C0B4A4)
    font_color = rgb(c0b4a4)
    fade_on_empty = false
    rounding = -1 # Makes it a perfect pill
    # Ambercore-matched system flags
    check_color = rgb(d68438) # Glowing amber gold when checking password
    fail_color = rgb(a35d55) # Lip muted rose-red on wrong password
    placeholder_text = <span foreground="##c0b4a4">    Logged in as $USER</span>
    hide_input = false
    position = -100, 100
    halign = right
    valign = bottom
}
