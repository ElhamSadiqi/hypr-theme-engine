# ==========================================
# CATPPUCCIN MOCHA - MODERN HYPRLOCK THEME
# ==========================================

background {
    monitor =
    path = /home/Arch/Downloads/Wallpaper/arch.png
    color = rgb(1e1e2e)

    # High blur pass count creates a frosty glass look
    blur_passes = 3
    blur_size = 8
    noise = 0.01
    contrast = 0.9
    brightness = 0.8
}

# ==========================================
# TIME (Large Asymmetric Digital Display)
# ==========================================
label {
    monitor =
    text = $TIME
    color = rgb(cdd6f4)
    font_size = 110
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 150
    halign = center
    valign = center
}

# ==========================================
# DATE (Subtle Elegant Typography)
# ==========================================
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A • %B %d")"
    color = rgb(89b4fa)
    font_size = 16
    font_family = JetBrainsMono Nerd Font Medium
    position = 0, 70
    halign = center
    valign = center
}

# ==========================================
# INPUT FIELD (Clean Pill Shape)
# ==========================================
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true

    # Clean border contrast
    outer_color = rgb(313244)
    inner_color = rgb(11111b)
    font_color = rgb(cdd6f4)

    fade_on_empty = true
    fade_timeout = 1000
    rounding = 25

    # Feedback state highlights
    check_color = rgb(f9e2af)
    fail_color = rgb(f38ba8)

    placeholder_text = <span foreground="##585b70" font_style="italic">enter password...</span>
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>

    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}
